<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a8fd0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5f8f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="40" fill="url(#bg)"/>

  <!-- AC Unit illustration -->
  <rect x="100" y="130" width="300" height="120" rx="15" ry="15" fill="white" opacity="0.95"/>
  <rect x="115" y="220" width="270" height="18" rx="9" ry="9" fill="#1a8fd0" opacity="0.3"/>

  <!-- Airflow lines -->
  <line x1="160" y1="260" x2="160" y2="290" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="210" y1="260" x2="210" y2="300" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="260" x2="260" y2="290" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="310" y1="260" x2="310" y2="300" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Lock icon (encrypted) -->
  <rect x="220" y="155" width="60" height="45" rx="8" fill="#2E96D0"/>
  <rect x="230" y="140" width="40" height="25" rx="10" fill="none" stroke="#2E96D0" stroke-width="6"/>
  <circle cx="250" cy="175" r="6" fill="white"/>
  <line x1="250" y1="178" x2="250" y2="188" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Title -->
  <text x="250" y="360" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Daikin iConnect</text>

  <!-- Subtitle -->
  <text x="250" y="395" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.85">Encrypted C-Type Adapter Support</text>

  <!-- Badge -->
  <rect x="155" y="415" width="190" height="32" rx="16" fill="white" opacity="0.2"/>
  <text x="250" y="437" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">BRP069C / BRP072C</text>
</svg>
